apiVersion: v1
kind: Secret
metadata:
  name: {{ include "risk-platform.fullname" . }}
  labels:
    {{- include "risk-platform.labels" . | nindent 4 }}
    {{- with .Values.customLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- with .Values.customAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
type: Opaque
data:
  {{- if .Values.secret.mlflowTrackingUri }}
  mlflow-tracking-uri: {{ .Values.secret.mlflowTrackingUri }}
  {{- else }}
  # Base64 encoded MLflow tracking URI
  # To generate: echo -n "http://mlflow.mlflow.svc.cluster.local:5000" | base64
  mlflow-tracking-uri: aHR0cDovL21sZmxvdy5tbGZsb3cuc3ZjLmNsdXN0ZXIubG9jYWw6NTAwMA==
  {{- end }}
  {{- if .Values.secret.additionalSecrets }}
  {{- range $key, $value := .Values.secret.additionalSecrets }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
  {{- end }}
