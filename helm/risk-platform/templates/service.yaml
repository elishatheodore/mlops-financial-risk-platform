apiVersion: v1
kind: Service
metadata:
  name: {{ include "risk-platform.fullname" . }}
  labels:
    {{- include "risk-platform.labels" . | nindent 4 }}
  {{- if .Values.monitoring.serviceMonitor.enabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.service.port }}"
    prometheus.io/path: "/metrics"
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
      {{- if .Values.monitoring.serviceMonitor.enabled }}
      - port: {{ .Values.service.port }}
        targetPort: {{ .Values.service.targetPort }}
        protocol: TCP
        name: metrics
      {{- end }}
  selector:
    {{- include "risk-platform.selectorLabels" . | nindent 4 }}
