apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "risk-platform.fullname" . }}
  labels:
    {{- include "risk-platform.labels" . | nindent 4 }}
data:
  logLevel: {{ .Values.config.logLevel | quote }}
  modelPath: {{ .Values.config.modelPath | quote }}
  mlflowTrackingUri: {{ .Values.config.mlflowTrackingUri | quote }}
  prometheusEnabled: {{ .Values.config.prometheusEnabled | quote }}
