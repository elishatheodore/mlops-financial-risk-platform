apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: risk-platform-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: risk-platform-dev
    app.kubernetes.io/component: argocd-application
    app.kubernetes.io/part-of: argocd
  annotations:
    argocd.argoproj.io/sync-options: CreateNamespace=true
spec:
  project: default
  source:
    repoURL: https://github.com/elishatheodore/mlops-financial-risk-platform
    targetRevision: HEAD
    path: helm/risk-platform
    helm:
      valueFiles:
        - values-dev.yaml
      releaseName: risk-platform-dev
      parameters:
        - name: image.tag
          value: "latest"
        - name: ingress.hosts[0].host
          value: "risk-platform-dev.company.com"
        - name: serviceMonitor.enabled
          value: true
        - name: autoscaling.enabled
          value: false
        - name: resources.requests.cpu
          value: "100m"
        - name: resources.requests.memory
          value: "256Mi"
        - name: resources.limits.cpu
          value: "500m"
        - name: resources.limits.memory
          value: "512Mi"
        - name: debug
          value: "true"
        - name: replicaCount
          value: "1"
  destination:
    server: https://kubernetes.default.svc
    namespace: risk-platform-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        factor: 2
        maxDuration: 5m
        duration: 5s
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: risk-platform-dev
      jsonPointers:
        - /spec/replicas
  revisionHistoryLimit: 3
  info:
    - name: Environment
      value: Development
    - name: Namespace
      value: risk-platform-dev
    - name: Repository
      value: https://github.com/elishatheodore/mlops-financial-risk-platform
    - name: Path
      value: helm/risk-platform
    - name: Values File
      value: values-dev.yaml
